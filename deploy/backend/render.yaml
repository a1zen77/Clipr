services:
  - type: web
    name: clipper-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: STORAGE_PATH
        value: ./storage
      - key: MAX_CLIP_DURATION
        value: 60
      - key: MAX_SOURCE_DURATION
        value: 600
